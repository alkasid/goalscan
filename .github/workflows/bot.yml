name: Goal Bot
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Goal Bot
        run: python main.py
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Commit & push report
        run: |
          git config user.name "goal-bot"
          git config user.email "goal-bot@users.noreply.github.com"
          git add docs/
          git add cache_teams.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update report $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
