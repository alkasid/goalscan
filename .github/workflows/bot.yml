name: Goal Bot
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: goalscan-push
  cancel-in-progress: false
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Goal Bot
        run: python main.py
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Commit & push report
        run: |
          git config user.name "goal-bot"
          git config user.email "goal-bot@users.noreply.github.com"
          git add docs/
          git add cache_teams.json 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: update report $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Retry push con rebase fino a 3 volte (gestisce push concorrenti dell'updater)
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && exit 0
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "All push attempts failed"
          exit 1
