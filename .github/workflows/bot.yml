name: Goal Bot

on:
  schedule:
    - cron: "0 * * * *"   # ogni ora
  workflow_dispatch:        # run manuale dal pannello Actions

permissions:
  contents: write           # necessario per committare docs/index.html

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Goal Bot
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python main.py

      - name: Commit & push report
        run: |
          git config user.name  "goal-bot"
          git config user.email "goal-bot@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: update report $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
