name: Backfill global history

on:
  workflow_dispatch:
    inputs:
      max_per_run:
        description: 'Max fixture (default 20000)'
        required: false
        default: '20000'
      max_workers:
        description: 'Worker paralleli (default 4)'
        required: false
        default: '4'
      save_every:
        description: 'Save ogni N fixture (default 200)'
        required: false
        default: '200'
      rps:
        description: 'Req/sec globali (default 20)'
        required: false
        default: '20'
      max_retries:
        description: 'Max retries su 429/5xx (default 5)'
        required: false
        default: '5'

permissions:
  contents: write

concurrency:
  group: goalscan-push
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          API_FOOTBALL_KEY:     ${{ secrets.API_FOOTBALL_KEY }}
          BACKFILL_MAX_PER_RUN: ${{ github.event.inputs.max_per_run }}
          BACKFILL_MAX_WORKERS: ${{ github.event.inputs.max_workers }}
          BACKFILL_SAVE_EVERY:  ${{ github.event.inputs.save_every }}
          BACKFILL_RPS:         ${{ github.event.inputs.rps }}
          BACKFILL_MAX_RETRIES: ${{ github.event.inputs.max_retries }}
        run: python backfill_global.py

      - name: Commit & push results
        run: |
          set -e
          git config user.email "goal-bot@users.noreply.github.com"
          git config user.name  "Goal Bot Backfill"

          # Stash i risultati del backfill prima del pull (resilient a race)
          git add docs/global_history.json docs/goal_events_cache.json
          if git diff --cached --quiet; then
            echo "Nessuna modifica da committare."
            exit 0
          fi
          git stash push -m "backfill-results" -- docs/global_history.json docs/goal_events_cache.json

          # Sincronizza con remoto
          git fetch origin main
          git reset --hard origin/main

          # Riporta i due file dal stash (sovrascrivendo eventuali modifiche remote)
          git checkout stash@{0} -- docs/global_history.json docs/goal_events_cache.json
          git stash drop || true

          git add docs/global_history.json docs/goal_events_cache.json
          if git diff --cached --quiet; then
            echo "Backfill non ha modifiche oltre quelle remote."
            exit 0
          fi

          # Riporta info di copertura nel commit message
          CACHED=$(python3 -c "
import json
d = json.load(open('docs/global_history.json'))
n = sum(1 for v in d.values() if v.get('first_min_cached') is not None)
print(f'{n}/{len(d)} ({n/len(d)*100:.1f}%)')
")
          git commit -m "backfill: cache 1° goal globale aggiornata · $CACHED"

          # Push con retry (lock-free perché abbiamo già fast-forwardato)
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push OK al tentativo $i"
              exit 0
            fi
            echo "Push tentativo $i fallito; rifetch + restamp"
            git fetch origin main
            git reset --soft origin/main
            git add docs/global_history.json docs/goal_events_cache.json
            git commit --amend -C HEAD --no-edit || true
            sleep $((i * 3))
          done
          echo "Push fallito dopo 5 tentativi"
          exit 1
