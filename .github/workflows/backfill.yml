name: Backfill global history

on:
  workflow_dispatch:
    inputs:
      max_per_run:
        description: 'Max fixture (default 20000)'
        required: false
        default: '20000'
      max_workers:
        description: 'Worker paralleli (default 4)'
        required: false
        default: '4'
      save_every:
        description: 'Save ogni N fixture (default 200)'
        required: false
        default: '200'
      rps:
        description: 'Req/sec globali (default 20)'
        required: false
        default: '20'
      max_retries:
        description: 'Max retries su 429/5xx (default 5)'
        required: false
        default: '5'

permissions:
  contents: write

concurrency:
  group: goalscan-push
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          API_FOOTBALL_KEY:     ${{ secrets.API_FOOTBALL_KEY }}
          BACKFILL_MAX_PER_RUN: ${{ github.event.inputs.max_per_run }}
          BACKFILL_MAX_WORKERS: ${{ github.event.inputs.max_workers }}
          BACKFILL_SAVE_EVERY:  ${{ github.event.inputs.save_every }}
          BACKFILL_RPS:         ${{ github.event.inputs.rps }}
          BACKFILL_MAX_RETRIES: ${{ github.event.inputs.max_retries }}
        run: python backfill_global.py

      - name: Commit & push results
        run: |
          set -e
          git config user.email "goal-bot@users.noreply.github.com"
          git config user.name  "Goal Bot Backfill"

          git add docs/global_history.json docs/goal_events_cache.json
          if git diff --cached --quiet; then
            echo "Nessuna modifica da committare."
            exit 0
          fi

          # Stash dei file di cache prima di sincronizzare con remoto
          git stash push -m "backfill-results" -- docs/global_history.json docs/goal_events_cache.json

          # Sync hard col remoto, poi ripristino i file dal stash
          git fetch origin main
          git reset --hard origin/main
          git checkout 'stash@{0}' -- docs/global_history.json docs/goal_events_cache.json
          git stash drop || true

          git add docs/global_history.json docs/goal_events_cache.json
          if git diff --cached --quiet; then
            echo "Nessuna modifica oltre quelle remote."
            exit 0
          fi

          # Coverage stat via jq (preinstallato in ubuntu-latest)
          TOTAL=$(jq 'length' docs/global_history.json)
          CACHED=$(jq '[.[] | select(.first_min_cached != null)] | length' docs/global_history.json)
          PCT=$(awk "BEGIN {printf \"%.1f\", $CACHED/$TOTAL*100}")

          git commit -m "backfill: cache 1° goal globale aggiornata · $CACHED/$TOTAL ($PCT%)"

          # Push con retry e amend automatico se arrivano nuovi commit
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push OK al tentativo $i"
              exit 0
            fi
            echo "Push tentativo $i fallito; rifetch + amend"
            git fetch origin main
            git reset --soft origin/main
            git add docs/global_history.json docs/goal_events_cache.json
            git commit --amend -C HEAD --no-edit || true
            sleep $((i * 3))
          done
          echo "Push fallito dopo 5 tentativi"
          exit 1
