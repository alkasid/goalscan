name: Live Updater
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run updater
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python updater.py

      - name: Commit ft_history.json
        run: |
          git config user.name "goal-bot"
          git config user.email "bot@goalscan"
          git add docs/ft_history.json
          git diff --staged --quiet || git commit -m "chore: ft_history $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
