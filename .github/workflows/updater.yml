name: Live Updater
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: goalscan-push
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run updater
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python updater.py

      - name: Commit & push ft_history (+ backfill global_history)
        run: |
          set -e
          git config user.name "goal-bot"
          git config user.email "bot@goalscan"

          git add docs/ft_history.json docs/global_history.json
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          # Stash dei due file aggiornati prima di sincronizzare col remoto.
          # Bypassa "unstaged changes" al pull --rebase quando python ha
          # appena toccato i file (race mtime/index).
          git stash push -m "updater-results" -- docs/ft_history.json docs/global_history.json

          git fetch origin main
          git reset --hard origin/main

          git checkout 'stash@{0}' -- docs/ft_history.json docs/global_history.json
          git stash drop || true

          git add docs/ft_history.json docs/global_history.json
          if git diff --staged --quiet; then
            echo "Nothing to commit dopo sync col remoto"
            exit 0
          fi

          git commit -m "chore: ft_history $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Push retry x5 con amend automatico se arrivano commit nuovi
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push OK al tentativo $i"
              exit 0
            fi
            echo "Push tentativo $i fallito, rifetch + amend"
            git fetch origin main
            git reset --soft origin/main
            git add docs/ft_history.json docs/global_history.json
            git commit --amend -C HEAD --no-edit || true
            sleep $((i * 3))
          done
          echo "Push fallito dopo 5 tentativi"
          exit 1
