# Workflow disabilitato: il fallback su GitHub Actions non e' praticabile per
# endpoint=it perche' Betfair Italy fa geo-blocking degli IP datacenter Azure
# (HTTP 403 + response HTML). Funzionerebbe solo per endpoint=com (account
# Betfair internazionale) ma il nostro setup e' .it.
#
# In caso il Pi vada giu', l'unica via percorribile e' un runner self-hosted
# con IP residenziale italiano (es. il Pi stesso registrato come runner GH
# Actions). Vedi docs.github.com/en/actions/hosting-your-own-runners.
#
# Storico: workflow funzionante creato il 2026-04-26 con stash+reset+amend
# resilient logic. Si trova nel git history al commit 24f3c55.

name: Betfair sync (fallback) [DISABLED]

on:
  # Trigger rimossi -- nessun run automatico ne' manuale.
  workflow_dispatch:
    inputs:
      acknowledge_disabled:
        description: 'Confermo che voglio runnare comunque (sara HTTP 403 per endpoint=it)'
        required: true
        default: 'no'

permissions:
  contents: read

jobs:
  disabled:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.acknowledge_disabled == 'yes-i-know' }}
    steps:
      - run: |
          echo "Workflow disabilitato. Vedi commento all'inizio del file."
          echo "Per endpoint=it usa il cron sul Raspberry Pi."
          exit 1
